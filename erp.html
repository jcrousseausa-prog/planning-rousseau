<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP — Tableau de Pilotage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg: #F7F6F2; --surface: #FFFFFF; --border: #E2E0D8; --border2: #C8C5BA;
  --text: #1A1916; --text2: #6B6860; --text3: #A09D96;
  --red: #C0392B; --red-bg: #FDECEA; --red-border: #F5B7B1;
  --green: #1E8449; --green-bg: #EAFAF1; --green-border: #A9DFBF;
  --orange: #D68910; --orange-bg: #FEF9E7; --orange-border: #FAD7A0;
  --blue: #1A5276; --blue-bg: #EAF2FB; --blue-border: #AED6F1;
  --purple: #6C3483; --purple-bg: #F4ECF7; --purple-border: #D2B4DE;
  --sidebar-w: 260px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; display: flex; flex-direction: column; }

/* HEADER */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: .75rem 1.25rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
.logo { font-size: 16px; font-weight: 600; letter-spacing: -.02em; }
.logo span { color: var(--text3); font-weight: 400; }
.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.sync-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.sync-pill.saving { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
.sync-pill.error { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.sync-pill.saving .sync-dot { animation: blink .6s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

/* LAYOUT */
.app-body { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 49px); }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-head { padding: .75rem; border-bottom: 1px solid var(--border); }
.sidebar-search { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 12px; background: var(--bg); color: var(--text); }
.sidebar-search:focus { outline: none; border-color: var(--text); }
.sidebar-list { flex: 1; overflow-y: auto; padding: .4rem 0; }
.sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text2); transition: background .12s; border-left: 3px solid transparent; }
.sidebar-item:hover { background: var(--bg); color: var(--text); }
.sidebar-item.active { background: var(--blue-bg); color: var(--blue); border-left-color: var(--blue); }
.sidebar-item .count { margin-left: auto; font-size: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 6px; color: var(--text3); }
.sidebar-add-btn { margin: .5rem .75rem; padding: 7px; border: 1px dashed var(--border2); border-radius: 8px; background: none; font-family: inherit; font-size: 12px; color: var(--text3); cursor: pointer; width: calc(100% - 1.5rem); text-align: center; }
.sidebar-add-btn:hover { background: var(--bg); color: var(--text); border-color: var(--text3); }

/* MAIN */
.main { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; }
.main-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text3); font-size: 14px; }

/* CHANTIER HEADER */
.chantier-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
.chantier-title { font-size: 18px; font-weight: 600; }
.chantier-actions { margin-left: auto; display: flex; gap: 6px; }

/* TRANCHE BLOC */
.tranche-bloc { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: .85rem; overflow: hidden; }
.tranche-head { display: flex; align-items: center; gap: 8px; padding: 9px 14px; cursor: pointer; background: var(--surface); border-bottom: 1px solid transparent; transition: background .12s; user-select: none; }
.tranche-head:hover { background: var(--bg); }
.tranche-head.open { border-bottom-color: var(--border); }
.tranche-chevron { font-size: 12px; color: var(--text3); transition: transform .2s; flex-shrink: 0; }
.tranche-chevron.open { transform: rotate(90deg); }
.tranche-name { font-size: 13px; font-weight: 600; flex: 1; }
.tranche-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.tranche-actions { display: flex; gap: 4px; flex-shrink: 0; }

/* PHASE BLOC */
.phases-wrap { padding: .6rem .75rem; }
.phase-bloc { border: 1px solid var(--border); border-radius: 8px; margin-bottom: .6rem; overflow: hidden; }
.phase-head { display: flex; align-items: center; gap: 7px; padding: 6px 10px; cursor: pointer; background: var(--bg); border-bottom: 1px solid transparent; user-select: none; }
.phase-head:hover { background: #ECEAE2; }
.phase-head.open { border-bottom-color: var(--border); }
.phase-chevron { font-size: 11px; color: var(--text3); transition: transform .2s; }
.phase-chevron.open { transform: rotate(90deg); }
.phase-name { font-size: 12px; font-weight: 600; color: var(--text2); flex: 1; }
.phase-actions { display: flex; gap: 3px; }

/* ARTICLES TABLE */
.articles-wrap { overflow-x: auto; }
.articles-table { width: 100%; border-collapse: collapse; min-width: 900px; }
.articles-table th { background: var(--bg); font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 5px 8px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
.articles-table td { padding: 4px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.articles-table tr:last-child td { border-bottom: none; }
.articles-table input[type=text], .articles-table input[type=date], .articles-table input[type=number] {
  width: 100%; padding: 3px 6px; border: 1px solid transparent; border-radius: 4px;
  background: transparent; color: var(--text); font-family: inherit; font-size: 12px;
}
.articles-table input:hover { border-color: var(--border); }
.articles-table input:focus { outline: none; border-color: var(--blue); background: var(--blue-bg); }
.articles-table select { width: 100%; padding: 3px 4px; border: 1px solid transparent; border-radius: 4px; background: transparent; font-family: inherit; font-size: 11px; cursor: pointer; }
.articles-table select:focus { outline: none; border-color: var(--blue); }
.articles-table .col-libelle { min-width: 160px; }
.articles-table .col-op { min-width: 130px; }
.articles-table .col-num { width: 70px; }
.articles-table .col-date { width: 110px; }
.articles-table .col-av { width: 80px; }
.articles-table .col-statut { width: 100px; }
.articles-table .col-del { width: 30px; text-align: center; }

/* AVANCEMENT */
.av-wrap { display: flex; align-items: center; gap: 4px; }
.av-bar-bg { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; min-width: 30px; }
.av-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.av-val { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text2); width: 28px; text-align: right; flex-shrink: 0; }

/* STATUT */
.statut-badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; white-space: nowrap; }
.statut-planifie { background: var(--bg); color: var(--text3); border: 1px solid var(--border); }
.statut-en_cours { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
.statut-termine { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.statut-bloque { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.statut-attente { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }

/* BTNS */
.btn { padding: 5px 11px; border: 1px solid var(--border2); border-radius: 7px; background: var(--surface); color: var(--text); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: background .12s; white-space: nowrap; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
.btn-primary:hover { background: #333; }
.btn-sm { padding: 3px 8px; font-size: 11px; border-radius: 5px; }
.btn-xs { padding: 1px 6px; font-size: 10px; border-radius: 4px; }
.btn-danger { color: var(--red); border-color: var(--red-border); background: var(--red-bg); }
.btn-ghost { border-color: transparent; background: transparent; color: var(--text3); }
.btn-ghost:hover { background: var(--bg); color: var(--text); border-color: var(--border); }
.icon-btn { border: none; background: none; cursor: pointer; color: var(--text3); font-size: 13px; padding: 2px 4px; border-radius: 4px; }
.icon-btn:hover { background: var(--bg); color: var(--text); }
.icon-btn.del:hover { background: var(--red-bg); color: var(--red); }

/* ADD ARTICLE ROW */
.add-article-row { padding: 5px 8px; }
.add-article-row button { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 3px 6px; border-radius: 4px; }
.add-article-row button:hover { background: var(--bg); color: var(--blue); }

/* ADD PHASE BTN */
.add-phase-row { padding: 4px 10px 8px; }

/* BADGE */
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; white-space: nowrap; }
.badge-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
.modal { background: var(--surface); border-radius: 14px; padding: 1.5rem; width: 460px; max-width: 95vw; }
.modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; }
.form-group { margin-bottom: .85rem; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
.form-group input, .form-group select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; background: var(--surface); color: var(--text); font-family: inherit; font-size: 13px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--blue); }

/* TOAST */
#toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 500; z-index: 999; opacity: 0; transform: translateY(10px); transition: all .25s; pointer-events: none; }
#toast.show { opacity: 1; transform: translateY(0); }

/* METRICS BAR */
.metrics-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.metric-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; display: flex; flex-direction: column; gap: 1px; }
.metric-chip-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.metric-chip-val { font-size: 16px; font-weight: 600; font-family: 'DM Mono', monospace; }

/* LINK PLANNING */
.planning-link { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: var(--blue); background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: 4px; padding: 1px 6px; text-decoration: none; }
.planning-link:hover { background: var(--blue); color: #fff; }

/* SCROLLBAR */
.sidebar-list::-webkit-scrollbar, .main::-webkit-scrollbar { width: 6px; }
.sidebar-list::-webkit-scrollbar-thumb, .main::-webkit-scrollbar-thumb { background: #C8C5BA; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">ERP Rousseau <span>/ Tableau de Pilotage</span></div>
  <div class="header-right">
    <a href="index.html" style="font-size:12px;color:var(--text2);text-decoration:none;border:1px solid var(--border);padding:4px 10px;border-radius:7px;">← Planning</a>
    <span class="sync-pill" id="sync-pill" style="display:none">
      <span class="sync-dot"></span>
      <span id="sync-text">Synchronisé</span>
    </span>
  </div>
</header>

<div class="app-body">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <input type="text" class="sidebar-search" placeholder="🔍 Rechercher un chantier…" oninput="filterSidebar(this.value)" id="sidebar-search"/>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
    <button class="sidebar-add-btn" onclick="openAddChantier()">+ Nouveau chantier</button>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-area">
    <div class="main-empty">← Sélectionnez un chantier</div>
  </div>
</div>

<div id="toast"></div>

<!-- MODAL CHANTIER -->
<div class="modal-bg" id="modal-chantier" style="display:none">
  <div class="modal">
    <h2 id="modal-chantier-title">Nouveau chantier</h2>
    <div class="form-group">
      <label>Nom du chantier</label>
      <input type="text" id="f-chantier-nom" placeholder="Ex: HAUTE GOURNIERE"/>
    </div>
    <div class="form-group">
      <label>Conducteur</label>
      <input type="text" id="f-chantier-conduc" placeholder="Ex: CG"/>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-chantier')">Annuler</button>
      <button class="btn btn-primary" onclick="saveChantier()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL TRANCHE -->
<div class="modal-bg" id="modal-tranche" style="display:none">
  <div class="modal">
    <h2 id="modal-tranche-title">Nouvelle tranche</h2>
    <div class="form-group">
      <label>Nom de la tranche</label>
      <input type="text" id="f-tranche-nom" placeholder="Ex: ORIG FOB EXT R+4"/>
    </div>
    <div class="form-group">
      <label>Conducteur / BE</label>
      <input type="text" id="f-tranche-conduc" placeholder="Ex: CG"/>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-tranche')">Annuler</button>
      <button class="btn btn-primary" onclick="saveTranche()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL PHASE -->
<div class="modal-bg" id="modal-phase" style="display:none">
  <div class="modal">
    <h2>Nouvelle phase</h2>
    <div class="form-group">
      <label>Numéro</label>
      <input type="text" id="f-phase-num" placeholder="Ex: Ph01"/>
    </div>
    <div class="form-group">
      <label>Nom de la phase</label>
      <input type="text" id="f-phase-nom" placeholder="Ex: Murs, Charpente, Bardage…"/>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-phase')">Annuler</button>
      <button class="btn btn-primary" onclick="savePhase()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBtgzwODBl1DWD4iev3QU3ABirEptVX5E0wVrqWEU3Jq_gdsjERzBoIhBRVluX41c/exec';

// ═══════════════════════════════════════════════════════════════
//  DONNÉES INITIALES — 34 chantiers, 431 tranches
// ═══════════════════════════════════════════════════════════════
const INIT_CHANTIERS = [
  {id:"c001",nom:"ORIGINALE (Halles Mans)",conduc:""},
  {id:"c002",nom:"H44 COUFFE",conduc:""},
  {id:"c003",nom:"POD JALLAIS",conduc:""},
  {id:"c004",nom:"POD MARCE",conduc:""},
  {id:"c005",nom:"ENJOY",conduc:""},
  {id:"c006",nom:"BLoc",conduc:""},
  {id:"c007",nom:"BLOCS",conduc:""},
  {id:"c008",nom:"HAUTE GOURNIERE",conduc:""},
  {id:"c009",nom:"GUYNEMER",conduc:""},
  {id:"c010",nom:"H44-CHATEAUBRIANT",conduc:""},
  {id:"c011",nom:"H44 - VAY",conduc:""},
  {id:"c012",nom:"ECHAPPE",conduc:""},
  {id:"c013",nom:"SH - GAUTHIOT LAMY",conduc:""},
  {id:"c014",nom:"SCI ALLFOR",conduc:""},
  {id:"c015",nom:"DELAUNEY",conduc:""},
  {id:"c016",nom:"POUSSCOOP",conduc:""},
  {id:"c017",nom:"MAITRE CUBE - MLH Avrillé",conduc:""},
  {id:"c018",nom:"NOVALLIANCE",conduc:""},
  {id:"c019",nom:"LINO VENTURA",conduc:""},
  {id:"c020",nom:"HYROME",conduc:""},
  {id:"c021",nom:"EPONA",conduc:""},
  {id:"c022",nom:"POD CANDE",conduc:""},
  {id:"c023",nom:"POD DURTAL",conduc:""},
  {id:"c024",nom:"POD - LONGUÉ-JUMELLES",conduc:""},
  {id:"c025",nom:"POD - ST ETIENNE",conduc:""},
  {id:"c026",nom:"BEL VIA",conduc:""},
  {id:"c027",nom:"VERDANIA",conduc:""},
  {id:"c028",nom:"VILLA SEB",conduc:""},
  {id:"c029",nom:"DETALLANTE",conduc:""},
  {id:"c030",nom:"BLANCHECOTTE",conduc:""},
  {id:"c031",nom:"GANDEMER",conduc:""},
  {id:"c032",nom:"ROU PREAU",conduc:""},
  {id:"c033",nom:"PANORAMA",conduc:""},
  {id:"c034",nom:"LYCEE LE FRESNE",conduc:""}
];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let state = {
  chantiers: [],   // [{id, nom, conduc}]
  tranches: [],    // [{id, chantier_id, nom, conduc}]
  phases: [],      // [{id, tranche_id, num, nom}]
  articles: [],    // [{id, phase_id, libelle, operation, qte_m2, qte_m3, date_ctvx, date_sortie_be, date_sortie_prod, budget_heures, avancement, statut}]
};

let currentChantierId = null;
let _modalCtx = {};
let _saveTimeout = null;
let _sidebarFilter = '';

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ═══════════════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function saveLS() {
  try { localStorage.setItem('erp_state', JSON.stringify(state)); } catch(e) {}
}

function loadLS() {
  try {
    const s = localStorage.getItem('erp_state');
    if (s) { state = JSON.parse(s); return true; }
  } catch(e) {}
  return false;
}

function scheduleSave() {
  if (_saveTimeout) clearTimeout(_saveTimeout);
  setSyncPill('saving', 'Enregistrement...');
  _saveTimeout = setTimeout(() => saveToSheets(), 2000);
}

async function saveToSheets() {
  saveLS();
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({action: 'saveERP', data: state})
    });
    const r = await res.json();
    if (r.ok) setSyncPill('ok', 'Enregistré ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
    else throw new Error(r.error || 'Erreur');
  } catch(e) {
    setSyncPill('error', 'Local OK');
    console.warn('Save error:', e.message);
  }
}

async function loadFromSheets() {
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({action: 'getERP'})
    });
    const r = await res.json();
    if (r.ok && r.data) {
      state = r.data;
      saveLS();
      return true;
    }
  } catch(e) { console.warn('Load error:', e.message); }
  return false;
}

function setSyncPill(mode, text) {
  const pill = document.getElementById('sync-pill');
  pill.style.display = 'inline-flex';
  pill.className = 'sync-pill' + (mode === 'ok' ? '' : ' ' + mode);
  document.getElementById('sync-text').textContent = text;
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════

const INIT_TRANCHES = [
  {id:"t1000",chantier_id:"c001",nom:"ORIG FOB EXT R+4",conduc:""},
  {id:"t1001",chantier_id:"c001",nom:"ORIG FOB EXT R+5",conduc:""},
  {id:"t1002",chantier_id:"c001",nom:"ORIG FOB EXT R+6",conduc:""},
  {id:"t1003",chantier_id:"c001",nom:"ORIG FOB EXT R+7",conduc:""},
  {id:"t1004",chantier_id:"c001",nom:"ORIG FOB EXT R+8",conduc:""},
  {id:"t1005",chantier_id:"c002",nom:"Bloc H44 COUFFE",conduc:""},
  {id:"t1006",chantier_id:"c003",nom:"BLOC POD JALLAIS",conduc:""},
  {id:"t1007",chantier_id:"c004",nom:"BLOC POD MARCE",conduc:""},
  {id:"t1008",chantier_id:"c005",nom:"ENJOY local vélo",conduc:""},
  {id:"t1009",chantier_id:"c005",nom:"ENJOY A1 - balcon structure équipée + caisson terrasse",conduc:""},
  {id:"t1010",chantier_id:"c005",nom:"ENJOY A1 - envoi traitement bois balcon",conduc:""},
  {id:"t1011",chantier_id:"c005",nom:"ENJOY A2 - balcon structure équipée + caisson terrasse",conduc:""},
  {id:"t1012",chantier_id:"c006",nom:"Bloc - Vay",conduc:""},
  {id:"t1013",chantier_id:"c006",nom:"Bloc - Chateaubriant A",conduc:""},

  {id:"t1430",chantier_id:"c034",nom:"LE FRESNE PORCHE Entrée - MOB",conduc:""}
];

async function init() {
  const hasLocal = loadLS();
  if (!hasLocal || state.chantiers.length === 0) {
    // Premier lancement — pré-remplir avec les vraies données
    state.chantiers = INIT_CHANTIERS.map(c => ({...c}));
    state.tranches = INIT_TRANCHES.map(t => ({...t}));
    saveLS();
  }
  // Essayer de charger depuis Sheets
  const ok = await loadFromSheets();
  if (!ok && state.chantiers.length === 0) {
    state.chantiers = INIT_CHANTIERS.map(c => ({...c}));
    state.tranches = INIT_TRANCHES.map(t => ({...t}));
    saveLS();
  }
  renderSidebar();
  setSyncPill('ok', 'Synchronisé');
}

// ═══════════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════════
function filterSidebar(q) { _sidebarFilter = q.trim().toLowerCase(); renderSidebar(); }

function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  const filtered = state.chantiers.filter(c =>
    !_sidebarFilter || c.nom.toLowerCase().includes(_sidebarFilter)
  );
  list.innerHTML = filtered.map(c => {
    const nbTranches = state.tranches.filter(t => t.chantier_id === c.id).length;
    return `<div class="sidebar-item${c.id === currentChantierId ? ' active' : ''}" onclick="selectChantier('${c.id}')">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.nom)}</span>
      ${nbTranches ? `<span class="count">${nbTranches}</span>` : ''}
    </div>`;
  }).join('');
}

function selectChantier(id) {
  currentChantierId = id;
  renderSidebar();
  renderMain();
}

// ═══════════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════════
function renderMain() {
  const main = document.getElementById('main-area');
  if (!currentChantierId) {
    main.innerHTML = '<div class="main-empty">← Sélectionnez un chantier</div>';
    return;
  }
  const chantier = state.chantiers.find(c => c.id === currentChantierId);
  if (!chantier) return;

  const tranches = state.tranches.filter(t => t.chantier_id === currentChantierId);

  // Métriques
  const allArticles = state.articles.filter(a => {
    const phase = state.phases.find(p => p.id === a.phase_id);
    if (!phase) return false;
    const tranche = state.tranches.find(t => t.id === phase.tranche_id);
    return tranche && tranche.chantier_id === currentChantierId;
  });
  const nbArticles = allArticles.length;
  const avMoyen = nbArticles ? Math.round(allArticles.reduce((s,a) => s + (+a.avancement||0), 0) / nbArticles) : 0;
  const nbTermines = allArticles.filter(a => a.statut === 'termine').length;
  const nbEnCours = allArticles.filter(a => a.statut === 'en_cours').length;

  let html = `<div class="chantier-header">
    <div class="chantier-title">${esc(chantier.nom)}</div>
    ${chantier.conduc ? `<span class="badge badge-blue">${esc(chantier.conduc)}</span>` : ''}
    <div class="chantier-actions">
      <button class="btn btn-sm" onclick="openEditChantier('${chantier.id}')">✎ Modifier</button>
      <button class="btn btn-sm btn-primary" onclick="openAddTranche('${chantier.id}')">+ Tranche</button>
    </div>
  </div>
  <div class="metrics-bar">
    <div class="metric-chip"><span class="metric-chip-label">Tranches</span><span class="metric-chip-val">${tranches.length}</span></div>
    <div class="metric-chip"><span class="metric-chip-label">Articles</span><span class="metric-chip-val">${nbArticles}</span></div>
    <div class="metric-chip"><span class="metric-chip-label">Avancement</span><span class="metric-chip-val" style="color:${avMoyen>=100?'var(--green)':avMoyen>0?'var(--blue)':'var(--text3)'}">${avMoyen}%</span></div>
    <div class="metric-chip"><span class="metric-chip-label">En cours</span><span class="metric-chip-val" style="color:var(--blue)">${nbEnCours}</span></div>
    <div class="metric-chip"><span class="metric-chip-label">Terminés</span><span class="metric-chip-val" style="color:var(--green)">${nbTermines}</span></div>
  </div>`;

  if (!tranches.length) {
    html += `<div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px">Aucune tranche — cliquez sur "+ Tranche"</div>`;
  } else {
    tranches.forEach(tranche => {
      html += renderTranche(tranche);
    });
  }

  main.innerHTML = html;

  // Restaurer états ouverts
  document.querySelectorAll('.tranche-body[data-id]').forEach(el => {
    if (localStorage.getItem('t_open_' + el.dataset.id) === '1') {
      el.style.display = 'block';
      const head = document.querySelector('.tranche-head[data-id="' + el.dataset.id + '"]');
      if (head) { head.classList.add('open'); head.querySelector('.tranche-chevron').classList.add('open'); }
    }
  });
  document.querySelectorAll('.phase-body[data-id]').forEach(el => {
    if (localStorage.getItem('p_open_' + el.dataset.id) === '1') {
      el.style.display = 'block';
      const head = document.querySelector('.phase-head[data-id="' + el.dataset.id + '"]');
      if (head) { head.classList.add('open'); head.querySelector('.phase-chevron').classList.add('open'); }
    }
  });
}

function renderTranche(tranche) {
  const phases = state.phases.filter(p => p.tranche_id === tranche.id);
  const allArts = state.articles.filter(a => phases.some(p => p.id === a.phase_id));
  const avMoyen = allArts.length ? Math.round(allArts.reduce((s,a) => s + (+a.avancement||0), 0) / allArts.length) : 0;
  const planningLink = `<a class="planning-link" href="index.html" title="Voir dans le planning">📅 Planning</a>`;

  return `<div class="tranche-bloc">
    <div class="tranche-head" data-id="${tranche.id}" onclick="toggleTranche('${tranche.id}')">
      <span class="tranche-chevron" id="tchev-${tranche.id}">▶</span>
      <span class="tranche-name">${esc(tranche.nom)}</span>
      ${tranche.conduc ? `<span class="badge badge-blue" style="font-size:10px">${esc(tranche.conduc)}</span>` : ''}
      ${allArts.length ? `<span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${avMoyen}%</span>` : ''}
      ${planningLink}
      <div class="tranche-actions" onclick="event.stopPropagation()">
        <button class="btn btn-xs" onclick="openEditTranche('${tranche.id}')">✎</button>
        <button class="btn btn-xs" onclick="openAddPhase('${tranche.id}')">+ Phase</button>
        <button class="icon-btn del btn-xs" onclick="deleteTranche('${tranche.id}')">✕</button>
      </div>
    </div>
    <div class="tranche-body" data-id="${tranche.id}" style="display:none">
      <div class="phases-wrap">
        ${phases.length ? phases.map(p => renderPhase(p)).join('') : '<div style="font-size:12px;color:var(--text3);padding:.5rem 0">Aucune phase — cliquez sur "+ Phase"</div>'}
        <div class="add-phase-row">
          <button class="btn btn-xs btn-ghost" onclick="openAddPhase('${tranche.id}')">+ Ajouter une phase</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderPhase(phase) {
  const articles = state.articles.filter(a => a.phase_id === phase.id);
  return `<div class="phase-bloc">
    <div class="phase-head" data-id="${phase.id}" onclick="togglePhase('${phase.id}')">
      <span class="phase-chevron" id="pchev-${phase.id}">▶</span>
      ${phase.num ? `<span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--blue);font-weight:700">${esc(phase.num)}</span>` : ''}
      <span class="phase-name">${esc(phase.nom)}</span>
      <span style="font-size:10px;color:var(--text3)">${articles.length} article${articles.length!==1?'s':''}</span>
      <div class="phase-actions" onclick="event.stopPropagation()">
        <button class="icon-btn btn-xs" onclick="openEditPhase('${phase.id}')">✎</button>
        <button class="icon-btn del btn-xs" onclick="deletePhase('${phase.id}')">✕</button>
      </div>
    </div>
    <div class="phase-body" data-id="${phase.id}" style="display:none">
      <div class="articles-wrap">
        <table class="articles-table">
          <thead><tr>
            <th class="col-libelle">Libellé / BL</th>
            <th class="col-op">Opération</th>
            <th class="col-num">m²</th>
            <th class="col-num">m³</th>
            <th class="col-date">CTVX</th>
            <th class="col-date">Sortie BE</th>
            <th class="col-date">Sortie Prod</th>
            <th class="col-num">Budget h</th>
            <th class="col-av">Avancement</th>
            <th class="col-statut">Statut</th>
            <th class="col-del"></th>
          </tr></thead>
          <tbody id="art-body-${phase.id}">
            ${articles.map(a => renderArticleRow(a)).join('')}
          </tbody>
        </table>
        <div class="add-article-row">
          <button onclick="addArticle('${phase.id}')">+ Ajouter un article</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderArticleRow(a) {
  const av = +a.avancement || 0;
  const avColor = av >= 100 ? 'var(--green)' : av > 0 ? 'var(--blue)' : 'var(--border2)';
  const statuts = ['planifie','en_cours','termine','bloque','attente'];
  const statutLabels = {'planifie':'Planifié','en_cours':'En cours','termine':'Terminé','bloque':'Bloqué','attente':'Attente'};
  return `<tr id="art-row-${a.id}">
    <td class="col-libelle"><input type="text" value="${esc(a.libelle||'')}" placeholder="Libellé…" onchange="updArt('${a.id}','libelle',this.value)"/></td>
    <td class="col-op"><input type="text" value="${esc(a.operation||'')}" placeholder="Opération…" onchange="updArt('${a.id}','operation',this.value)"/></td>
    <td class="col-num"><input type="number" value="${a.qte_m2||''}" placeholder="0" min="0" step="0.1" onchange="updArt('${a.id}','qte_m2',this.value)"/></td>
    <td class="col-num"><input type="number" value="${a.qte_m3||''}" placeholder="0" min="0" step="0.01" onchange="updArt('${a.id}','qte_m3',this.value)"/></td>
    <td class="col-date"><input type="date" value="${a.date_ctvx||''}" onchange="updArt('${a.id}','date_ctvx',this.value)"/></td>
    <td class="col-date"><input type="date" value="${a.date_sortie_be||''}" onchange="updArt('${a.id}','date_sortie_be',this.value)"/></td>
    <td class="col-date"><input type="date" value="${a.date_sortie_prod||''}" onchange="updArt('${a.id}','date_sortie_prod',this.value)"/></td>
    <td class="col-num"><input type="number" value="${a.budget_heures||''}" placeholder="0" min="0" step="0.5" onchange="updArt('${a.id}','budget_heures',this.value)"/></td>
    <td class="col-av">
      <div class="av-wrap">
        <div class="av-bar-bg"><div class="av-bar-fill" style="width:${Math.min(av,100)}%;background:${avColor}"></div></div>
        <input type="number" value="${av}" min="0" max="100" style="width:38px;border:none;background:none;font-size:10px;font-family:'DM Mono',monospace;text-align:right;color:var(--text2);padding:0" onchange="updArt('${a.id}','avancement',this.value);rerenderAvBar(this,'${a.id}')"/>
        <span style="font-size:10px;color:var(--text3)">%</span>
      </div>
    </td>
    <td class="col-statut">
      <select onchange="updArt('${a.id}','statut',this.value)">
        ${statuts.map(s => `<option value="${s}"${a.statut===s?' selected':''}>${statutLabels[s]}</option>`).join('')}
      </select>
    </td>
    <td class="col-del"><button class="icon-btn del" onclick="deleteArticle('${a.id}')">✕</button></td>
  </tr>`;
}

function rerenderAvBar(input, artId) {
  const av = Math.min(Math.max(0, +input.value || 0), 100);
  const row = document.getElementById('art-row-' + artId);
  if (!row) return;
  const fill = row.querySelector('.av-bar-fill');
  if (fill) {
    const color = av >= 100 ? 'var(--green)' : av > 0 ? 'var(--blue)' : 'var(--border2)';
    fill.style.width = av + '%';
    fill.style.background = color;
  }
}

// ═══════════════════════════════════════════════════════════════
//  TOGGLE
// ═══════════════════════════════════════════════════════════════
function toggleTranche(id) {
  const body = document.querySelector('.tranche-body[data-id="' + id + '"]');
  const head = document.querySelector('.tranche-head[data-id="' + id + '"]');
  const chev = document.getElementById('tchev-' + id);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  head?.classList.toggle('open', !open);
  chev?.classList.toggle('open', !open);
  localStorage.setItem('t_open_' + id, open ? '0' : '1');
}

function togglePhase(id) {
  const body = document.querySelector('.phase-body[data-id="' + id + '"]');
  const head = document.querySelector('.phase-head[data-id="' + id + '"]');
  const chev = document.getElementById('pchev-' + id);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  head?.classList.toggle('open', !open);
  chev?.classList.toggle('open', !open);
  localStorage.setItem('p_open_' + id, open ? '0' : '1');
}

// ═══════════════════════════════════════════════════════════════
//  CHANTIER CRUD
// ═══════════════════════════════════════════════════════════════
function openAddChantier() {
  _modalCtx = {type: 'add'};
  document.getElementById('modal-chantier-title').textContent = 'Nouveau chantier';
  document.getElementById('f-chantier-nom').value = '';
  document.getElementById('f-chantier-conduc').value = '';
  document.getElementById('modal-chantier').style.display = 'flex';
}

function openEditChantier(id) {
  const c = state.chantiers.find(x => x.id === id);
  if (!c) return;
  _modalCtx = {type: 'edit', id};
  document.getElementById('modal-chantier-title').textContent = 'Modifier le chantier';
  document.getElementById('f-chantier-nom').value = c.nom;
  document.getElementById('f-chantier-conduc').value = c.conduc || '';
  document.getElementById('modal-chantier').style.display = 'flex';
}

function saveChantier() {
  const nom = document.getElementById('f-chantier-nom').value.trim();
  const conduc = document.getElementById('f-chantier-conduc').value.trim();
  if (!nom) return;
  if (_modalCtx.type === 'add') {
    const c = {id: uid(), nom, conduc};
    state.chantiers.push(c);
    currentChantierId = c.id;
  } else {
    const c = state.chantiers.find(x => x.id === _modalCtx.id);
    if (c) { c.nom = nom; c.conduc = conduc; }
  }
  closeModal('modal-chantier');
  scheduleSave();
  renderSidebar();
  renderMain();
  toast('Chantier enregistré');
}

// ═══════════════════════════════════════════════════════════════
//  TRANCHE CRUD
// ═══════════════════════════════════════════════════════════════
function openAddTranche(chantierId) {
  _modalCtx = {type: 'add', chantierId};
  document.getElementById('modal-tranche-title').textContent = 'Nouvelle tranche';
  document.getElementById('f-tranche-nom').value = '';
  document.getElementById('f-tranche-conduc').value = '';
  document.getElementById('modal-tranche').style.display = 'flex';
}

function openEditTranche(id) {
  const t = state.tranches.find(x => x.id === id);
  if (!t) return;
  _modalCtx = {type: 'edit', id};
  document.getElementById('modal-tranche-title').textContent = 'Modifier la tranche';
  document.getElementById('f-tranche-nom').value = t.nom;
  document.getElementById('f-tranche-conduc').value = t.conduc || '';
  document.getElementById('modal-tranche').style.display = 'flex';
}

function saveTranche() {
  const nom = document.getElementById('f-tranche-nom').value.trim();
  const conduc = document.getElementById('f-tranche-conduc').value.trim();
  if (!nom) return;
  if (_modalCtx.type === 'add') {
    state.tranches.push({id: uid(), chantier_id: _modalCtx.chantierId, nom, conduc});
  } else {
    const t = state.tranches.find(x => x.id === _modalCtx.id);
    if (t) { t.nom = nom; t.conduc = conduc; }
  }
  closeModal('modal-tranche');
  scheduleSave();
  renderSidebar();
  renderMain();
  toast('Tranche enregistrée');
}

function deleteTranche(id) {
  if (!confirm('Supprimer cette tranche et toutes ses phases/articles ?')) return;
  const phases = state.phases.filter(p => p.tranche_id === id);
  phases.forEach(p => { state.articles = state.articles.filter(a => a.phase_id !== p.id); });
  state.phases = state.phases.filter(p => p.tranche_id !== id);
  state.tranches = state.tranches.filter(t => t.id !== id);
  scheduleSave();
  renderSidebar();
  renderMain();
  toast('Tranche supprimée');
}

// ═══════════════════════════════════════════════════════════════
//  PHASE CRUD
// ═══════════════════════════════════════════════════════════════
function openAddPhase(trancheId) {
  _modalCtx = {type: 'add', trancheId};
  const existing = state.phases.filter(p => p.tranche_id === trancheId);
  document.getElementById('f-phase-num').value = 'Ph' + String(existing.length + 1).padStart(2,'0');
  document.getElementById('f-phase-nom').value = '';
  document.getElementById('modal-phase').style.display = 'flex';
}

function openEditPhase(id) {
  const p = state.phases.find(x => x.id === id);
  if (!p) return;
  _modalCtx = {type: 'edit', id};
  document.getElementById('f-phase-num').value = p.num || '';
  document.getElementById('f-phase-nom').value = p.nom;
  document.getElementById('modal-phase').style.display = 'flex';
}

function savePhase() {
  const num = document.getElementById('f-phase-num').value.trim();
  const nom = document.getElementById('f-phase-nom').value.trim();
  if (!nom) return;
  if (_modalCtx.type === 'add') {
    const phase = {id: uid(), tranche_id: _modalCtx.trancheId, num, nom};
    state.phases.push(phase);
  } else {
    const p = state.phases.find(x => x.id === _modalCtx.id);
    if (p) { p.num = num; p.nom = nom; }
  }
  closeModal('modal-phase');
  scheduleSave();
  renderMain();
  toast('Phase enregistrée');
}

function deletePhase(id) {
  if (!confirm('Supprimer cette phase et tous ses articles ?')) return;
  state.articles = state.articles.filter(a => a.phase_id !== id);
  state.phases = state.phases.filter(p => p.id !== id);
  scheduleSave();
  renderMain();
  toast('Phase supprimée');
}

// ═══════════════════════════════════════════════════════════════
//  ARTICLE CRUD
// ═══════════════════════════════════════════════════════════════
function addArticle(phaseId) {
  const art = {
    id: uid(), phase_id: phaseId,
    libelle: '', operation: '',
    qte_m2: '', qte_m3: '',
    date_ctvx: '', date_sortie_be: '', date_sortie_prod: '',
    budget_heures: '', avancement: '0', statut: 'planifie'
  };
  state.articles.push(art);
  // Ajouter la ligne directement sans re-render complet
  const tbody = document.getElementById('art-body-' + phaseId);
  if (tbody) {
    tbody.insertAdjacentHTML('beforeend', renderArticleRow(art));
    const inputs = tbody.querySelectorAll('input[type=text]');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }
  scheduleSave();
}

function updArt(id, field, val) {
  const art = state.articles.find(a => a.id === id);
  if (art) { art[field] = val; scheduleSave(); }
}

function deleteArticle(id) {
  state.articles = state.articles.filter(a => a.id !== id);
  const row = document.getElementById('art-row-' + id);
  if (row) row.remove();
  scheduleSave();
  toast('Article supprimé');
}

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// Fermer modals en cliquant dehors
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if (e.target === bg) bg.style.display = 'none'; });
});

// ═══════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════
init();
</script>
</body>
</html>
